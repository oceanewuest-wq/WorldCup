.tabs{display:flex;gap:0;min-width:max-content;padding:0 12px}
.tab{padding:12px 14px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}

.match-stage{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#888}
.match-date{font-size:11px;color:#aaa}
.match-timezones{font-size:10px;color:#bbb;margin-bottom:10px}

.team-flag{font-size:22px}
.team-name{font-size:14px;font-weight:700}

.badge-et{background:#e8f0fe;color:#1a56c4}
.badge-pen{background:#f3e8fd;color:#7b1fa2}

.bet-label{font-size:12px;color:#666;font-weight:500}
.score-input{width:50px;height:40px;text-align:center;font-size:20px;font-weight:700;border:2px solid #e0e0e0;border-radius:10px;background:#fafafa;transition:border 0.15s}
.score-input:focus{outline:none;border-color:#4f86f7}
.score-input:disabled{background:#f5f5f5;color:#ccc;cursor:not-allowed}
.sep{font-size:20px;font-weight:700;color:#ccc}
.pen-select{height:36px;border:2px solid #e0e0e0;border-radius:10px;padding:0 10px;font-size:12px;font-weight:600;background:#fafafa;cursor:pointer}
.pen-select:focus{outline:none;border-color:#4f86f7}

.btn-danger{background:#fce8e6;color:#c5221f}
.btn-sm{padding:6px 14px;font-size:12px}
.saved-msg{font-size:12px;color:#27ae60;font-weight:600}

function flag(team){
  if(!team) return 'рҹҸіпёҸ';
  if(FLAGS[team]) return FLAGS[team];
  // Try partial match for API name variants
  for(const [k,v] of Object.entries(FLAGS)){
    if(k && team.toLowerCase().includes(k.toLowerCase()) && k.length > 3) return v;
    if(k && k.toLowerCase().includes(team.toLowerCase()) && team.length > 3) return v;
  }
  return 'рҹҸіпёҸ';
}
const POSITION_INFO = {
  'Attacker':  {icon:'вҡЎ', pts:6,  unit:'per goal',        label:'Attacker'},
  'Midfielder':{icon:'рҹҺҜ', pts:10, unit:'per goal',        label:'Midfielder'},
  'Defender':  {icon:'рҹӣЎпёҸ', pts:24, unit:'per goal',        label:'Defender'},
  'Goalkeeper':{icon:'рҹ§Ө', pts:7,  unit:'per clean sheet', label:'Goalkeeper'},
};
const STAGE_POINTS = {
  'GROUP_STAGE':       {exact:7,  winner:3},
  'ROUND_OF_16':       {exact:9,  winner:4},
  'LAST_16':           {exact:9,  winner:4},
  'QUARTER_FINALS':    {exact:9,  winner:4},
  'SEMI_FINALS':       {exact:11, winner:5},
  'FINAL':             {exact:11, winner:5},
};

// ============ HELPERS ============
// flag() function defined above with FLAGS
function stagePoints(stage){ 
  const s=(stage||'').toUpperCase();
  if(s.includes('FINAL')&&!s.includes('SEMI')&&!s.includes('QUARTER')) return STAGE_POINTS['FINAL'];
  if(s.includes('SEMI')) return STAGE_POINTS['SEMI_FINALS'];
  if(s.includes('QUARTER')) return STAGE_POINTS['QUARTER_FINALS'];
  if(s.includes('16')||s.includes('LAST_16')) return STAGE_POINTS['ROUND_OF_16'];
  return STAGE_POINTS['GROUP_STAGE'];
}
function isKnockout(stage){ const s=(stage||'').toUpperCase(); return s.includes('FINAL')||s.includes('SEMI')||s.includes('QUARTER')||s.includes('16'); }
function getScore(matchId){ return state.scores[matchId]||null; }
function isMatchLocked(m){ if(!m||!m.date) return false; return Date.now() >= new Date(m.date).getTime(); }
function isMatchFinished(m){ const s=getScore(m.id); return m.status==='FINISHED'||(s&&s.status==='FINISHED'); }
function isMatchLive(m){ const s=getScore(m.id); return m.status==='IN_PLAY'||m.status==='PAUSED'||(s&&s.status==='IN_PLAY'); }

function formatMatchDate(dateStr){
  if(!dateStr) return 'TBD';
  const d = new Date(dateStr);
  const date = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  const ch = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Zurich'});
  const uk = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
  const us = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'});
  return {date, times:`CH ${ch} В· UK ${uk} В· US ${us}`};
}

function formatGroup(g){ if(!g) return 'Knockout'; return g.replace('GROUP_','Group ').replace(/_/g,' '); }

function getPoints(bet, scoreData, stage){
  if(!scoreData||!scoreData.regular) return null;
  const [r1,r2] = scoreData.regular;
  const [b1,b2] = bet;
  const sp = stagePoints(stage);
  if(b1===r1 && b2===r2){
    // For knockout with pen winner prediction
    if(isKnockout(stage) && r1===r2 && bet[2] && scoreData.penWinner){
      if(bet[2]===scoreData.penWinner) return{pts:sp.exact+2,type:'exact',bonus:true};
      return{pts:sp.exact,type:'exact'};
    }
    return{pts:sp.exact,type:'exact'};
  }
  const rw = r1>r2?'home':r1<r2?'away':'draw';
  const bw = b1>b2?'home':b1<b2?'away':'draw';
  if(rw===bw){
    if(isKnockout(stage) && r1===r2 && bet[2] && scoreData.penWinner){
      if(bet[2]===scoreData.penWinner) return{pts:sp.winner+2,type:'winner',bonus:true};
      return{pts:sp.winner,type:'winner'};
    }
    return{pts:sp.winner,type:'winner'};
  }
  return{pts:0,type:'none'};
}

function calcGoalscorerPts(player){
  const picks = state.goalScorerBets?.[player]||[];
  let pts=0;
  picks.forEach(p=>{
    const stats = state.goalScorerStats?.[p.name]||{};
    if(p.position==='Goalkeeper') pts+=(stats.cleanSheets||0)*7;
    else pts+=(stats.goals||0)*POSITION_INFO[p.position].pts;
  });
  return pts;
}

function calcTotal(player){
  let pts=0, exact=0, winner=0;
  (state.matches||[]).forEach(m=>{
    const bet=state.bets[m.id]?.[player];
    const sc=getScore(m.id);
    if(!bet||!sc) return;
    const r=getPoints(bet,sc,m.stage);
    if(!r) return;
    pts+=r.pts; if(r.type==='exact') exact++; else if(r.type==='winner') winner++;
  });
  const ts=state.topScorerBets?.[player];
  if(ts&&state.topScorerWinner&&ts===state.topScorerWinner) pts+=10;
  const fp=state.finalistBets?.[player]||[];
  if(state.finalists) fp.forEach(t=>{ if(state.finalists.includes(t)) pts+=12; });
  const wp=state.wcWinnerBets?.[player];
  if(wp&&state.wcWinner&&wp===state.wcWinner) pts+=25;
  pts+=calcGoalscorerPts(player);
  return{pts,exact,winner};
}

}

function renderMatches(showFinished){
  const el=document.getElementById(showFinished?'tab-finished':'tab-upcoming');
  const matches=(state.matches||[]).filter(m=>showFinished?isMatchFinished(m):!isMatchFinished(m)).sort((a,b)=>showFinished?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date));
  if(!matches.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">${showFinished?'вң…':'вҸі'}</div>${showFinished?'No finished matches yet':'No upcoming matches'}</div>`;
    return;
  }
  const players=Object.keys(state.players);
  el.innerHTML=matches.map(m=>renderMatchCard(m,players)).join('');
}

function renderMatchCard(m, players){
  const sc=getScore(m.id);
  const myBet=state.bets[m.id]?.[currentUser]||null;
  const locked=isMatchLocked(m), finished=isMatchFinished(m), live=isMatchLive(m);
  const {date,times}=formatMatchDate(m.date);
  const knockout=isKnockout(m.stage);

  let scoreBadge='';
  if(finished&&sc){
    const [r1,r2]=sc.regular;
    let cls='score-final', suffix='';
    if(sc.extra) suffix=` <span style="font-size:10px;opacity:0.7">(AET)</span>`;
    if(sc.penWinner||sc.penalties) suffix=` <span style="font-size:10px;opacity:0.7">(Pen)</span>`;
    scoreBadge=`<div class="${cls} score-badge">${r1} вҖ“ ${r2}${suffix}</div>`;
  } else if(live&&sc){
    const [r1,r2]=sc.regular;
    scoreBadge=`<div class="score-live score-badge">${r1} вҖ“ ${r2}</div>`;
  } else {
    const {times:t}=formatMatchDate(m.date);
    const chTime=t.split('В·')[0].replace('CH','').trim();
    scoreBadge=`<div class="score-upcoming score-badge">${chTime}</div>`;
  }

  let statusBadge='';
  if(finished) statusBadge='<span class="badge badge-final">Final</span>';
  else if(live) statusBadge='<span class="badge badge-live">LIVE</span>';
  else if(locked) statusBadge='<span class="badge badge-locked">Locked</span>';
  if(sc?.extra&&finished) statusBadge+='<span class="badge badge-et">AET</span>';
  if((sc?.penWinner||sc?.penalties)&&finished) statusBadge+='<span class="badge badge-pen">Penalties</span>';

  // Bet form
  let betSection='';
  if(!locked&&!finished){
    const penField=knockout?`<select class="pen-select" id="pen-${m.id}"><option value="">If draw вҶ’ who wins?</option><option value="home">${m.team1}</option><option value="away">${m.team2}</option></select>`:'';
    betSection=`<div class="bet-form">
      <span class="bet-label">Your prediction:</span>
      <input class="score-input" type="number" id="s1-${m.id}" min="0" max="20" value="${myBet?myBet[0]:''}" placeholder="0" ${myBet?'disabled':''}/>
      <span class="sep">вҖ“</span>
      <input class="score-input" type="number" id="s2-${m.id}" min="0" max="20" value="${myBet?myBet[1]:''}" placeholder="0" ${myBet?'disabled':''}/>
      ${!myBet?penField:''}
      ${!myBet?`<button class="btn btn-primary btn-sm" onclick="placeBet('${m.id}','${m.stage}')">Save prediction</button>`:'<span class="saved-msg">вң“ Prediction saved!</span>'}
    </div>
    ${myBet&&knockout&&myBet[2]?`<div style="font-size:11px;color:#888">If draw: ${myBet[2]==='home'?m.team1:m.team2} wins</div>`:''}`;
  } else if(locked&&!finished){
    betSection=myBet?`<div class="locked-msg">рҹ”’ Your prediction: <strong>${myBet[0]} вҖ“ ${myBet[1]}</strong>${myBet[2]?' ('+( myBet[2]==='home'?m.team1:m.team2)+' if draw)':''}</div>`:`<div class="locked-msg">рҹ”’ Predictions closed</div>`;
  }

  // Bets reveal
  let betsHtml='';
  if(finished||locked){
    const cards=players.map(p=>{
      const bet=state.bets[m.id]?.[p];
      const isYou=p===currentUser;
      const pData=state.players[p];
      const emoji=pData?.emoji||'вҡҪ';
      if(!bet) return`<div class="bet-card${isYou?' you':''}" style="background:#f8f9fb"><div class="bet-name" style="color:#bbb">${emoji} ${p}${isYou?' (you)':''}</div><div class="bet-score" style="color:#ddd">вҖ“</div><div class="bet-pts pts-none">no pred.</div></div>`;
      const res=(finished&&sc)?getPoints(bet,sc,m.stage):null;
      let ptsTxt='pending',ptsClass='pts-pending';
      if(res){
        if(res.type==='exact'){ptsTxt=`+${res.pts} pts вң“${res.bonus?' рҹҺҜ':''}`;ptsClass='pts-exact';}
        else if(res.type==='winner'){ptsTxt=`+${res.pts} pt${res.bonus?' рҹҺҜ':''}`;ptsClass='pts-winner';}
        else{ptsTxt='0 pts вң—';ptsClass='pts-none';}
      }
      return`<div class="bet-card${isYou?' you':''}" style="background:${colorFor(p).bg}">
        <div class="bet-name" style="color:${colorFor(p).text}">${emoji} ${p}${isYou?' (you)':''}</div>
        <div class="bet-score" style="color:${colorFor(p).text}">${bet[0]} вҖ“ ${bet[1]}</div>
        <div class="bet-pts ${ptsClass}">${ptsTxt}</div>
      </div>`;
    }).join('');
    const cnt=players.filter(p=>state.bets[m.id]?.[p]).length;
    betsHtml=`<div style="margin-top:14px"><div class="section-title">All predictions${!finished?` (${cnt} placed вҖ” revealed at kick-off)`:''}</div><div class="bets-grid">${cards}</div></div>`;
  } else {
    const cnt=players.filter(p=>state.bets[m.id]?.[p]).length;

  return`<div class="card">
    <div class="match-meta">
      <div><span class="match-stage">${formatGroup(m.group)}</span>${statusBadge}</div>

      <div class="team-block right"><span class="team-name">${m.team2}</span><span class="team-flag">${flag(m.team2)}</span></div>
    </div>
    <div class="bet-section">${betSection}${betsHtml}</div>
  </div>`;
}

function placeBet(matchId, stage){
  const m=(state.matches||[]).find(x=>x.id===matchId);
  if(!m||isMatchLocked(m)){showToast('Predictions are closed!');return;}
  if(state.bets[matchId]?.[currentUser]){showToast('Already saved!');return;}
  const s1=parseInt(document.getElementById('s1-'+matchId)?.value);
  const s2=parseInt(document.getElementById('s2-'+matchId)?.value);
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0){showToast('Please enter valid scores (0 or more)');return;}
  const penEl=document.getElementById('pen-'+matchId);
  const penWinner=penEl?penEl.value||null:null;
  if(!state.bets[matchId]) state.bets[matchId]={};
  state.bets[matchId][currentUser]=[s1,s2,penWinner];
  saveData({bets:state.bets});
  showToast('Prediction saved! рҹҺҜ');
  renderMatches(false);
}

function closeAdmin(){ document.getElementById('admin-modal').style.display='none'; }

async function saveAdmin(){
  const winner=document.getElementById('adm-winner').value.trim();
  const f1=document.getElementById('adm-final1').value.trim();
  const f2=document.getElementById('adm-final2').value.trim();
  const scorer=document.getElementById('adm-scorer').value.trim();
  const statsRaw=document.getElementById('adm-stats').value.trim();
  const penMatch=document.getElementById('adm-pen-match').value.trim();
  const penWinner=document.getElementById('adm-pen-winner').value;
  const resetUser=document.getElementById('adm-reset-user').value.trim();
  const resetPin=document.getElementById('adm-reset-pin').value.trim();
  try{
    if(winner) await apiCall('/api/admin','POST',{password:'ORSEN',action:'setWcWinner',data:{winner}});
    if(f1&&f2) await apiCall('/api/admin','POST',{password:'ORSEN',action:'setFinalists',data:{finalists:[f1,f2]}});
    if(scorer) await apiCall('/api/admin','POST',{password:'ORSEN',action:'setTopScorer',data:{topScorer:scorer}});
    if(statsRaw){ try{ const stats=JSON.parse(statsRaw); await apiCall('/api/admin','POST',{password:'ORSEN',action:'setGoalscorerStats',data:{stats}}); }catch(e){showToast('Invalid JSON for stats');return;} }
    if(penMatch&&penWinner) await apiCall('/api/admin','POST',{password:'ORSEN',action:'setPenWinner',data:{matchId:penMatch,winner:penWinner}});
    if(resetUser&&resetPin) await apiCall('/api/admin','POST',{password:'ORSEN',action:'resetPlayer',data:{username:resetUser,newPin:resetPin}});
    document.getElementById('adm-msg').style.display='block';
    await loadState();
    showToast('Admin changes saved! вң“');
    setTimeout(()=>{ document.getElementById('adm-msg').style.display='none'; },2000);
  }catch(e){ showToast('Error saving changes'); }
}

  const savedEmoji=localStorage.getItem('wc2026_emoji');
  if(savedUser&&savedEmoji){
    currentUser=savedUser; currentEmoji=savedEmoji;
    await loadState();
    if(state.players[savedUser]){

      document.getElementById('app').style.display='block';
      initApp();
      return;

};
